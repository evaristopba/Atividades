<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aventura das Sequências - Sem Rolagem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #4a6bff; --success: #28a745; --danger: #dc3545; --gold: #ffc107;
            --bg-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --header-color: #4a6bff;
        }

        body.theme-1 { --bg-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); --header-color: #1b5e20; }
        body.theme-2 { --bg-gradient: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%); --header-color: #0d47a1; }
        body.theme-3 { --bg-gradient: linear-gradient(135deg, #4b6cb7 0%, #182848 100%); --header-color: #311b92; }
        body.theme-4 { --bg-gradient: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); --header-color: #ff6f00; }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Comic Sans MS', 'Segoe UI', cursive, sans-serif;
            background: var(--bg-gradient);
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* IMPEDE A ROLAGEM */
            padding: 10px;
        }

        .container {
            width: 100%; height: 98vh; max-width: 1200px;
            background: rgba(255,255,255,0.95);
            border-radius: 30px; padding: 15px;
            display: flex; flex-direction: column;
            border: 6px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* Topo: Admin + Título e Stats em uma linha */
        header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; gap: 15px;
        }

        .main-title { font-size: 1.5em; color: var(--header-color); flex: 1; }

        .admin-panel { display: flex; gap: 8px; }
        .btn-admin {
            border: none; padding: 6px 12px; border-radius: 12px; cursor: pointer;
            font-weight: bold; font-size: 0.75em; color: white;
        }
        .btn-new { background: #ff4757; } .btn-key { background: #495057; }

        /* Grade de Stats mais compacta */
        .stats-strip {
            display: flex; gap: 8px; background: #f8f9fa; 
            padding: 8px 15px; border-radius: 20px; border: 2px solid #eee;
        }
        .stat-item { text-align: center; min-width: 60px; }
        .stat-item b { display: block; font-size: 1.2em; color: var(--header-color); line-height: 1; }
        .stat-item span { font-size: 0.6em; text-transform: uppercase; color: #888; }

        /* Abas de nível menores */
        .level-selector { display: flex; gap: 6px; margin-bottom: 10px; }
        .level-tab {
            flex: 1; padding: 8px; border-radius: 15px; border: 3px solid #eee;
            background: #fff; cursor: pointer; font-weight: bold; font-size: 0.85em;
            text-align: center; transition: 0.3s;
        }
        .level-tab.active { color: white; border-color: white; transform: scale(1.03); }
        .tab-1.active { background: #2ecc71; } .tab-2.active { background: #3498db; }
        .tab-3.active { background: #9b59b6; } .tab-4.active { background: #f39c12; }

        /* Área do Jogo: Ocupa o resto da tela */
        .game-area {
            flex: 1; display: grid; grid-template-columns: 1fr 280px;
            gap: 15px; min-height: 0; /* Essencial para o flex child não transbordar */
        }

        .challenges-container {
            display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
        }

        .challenge-box {
            background: white; border: 2px solid #f1f1f1; border-radius: 18px;
            padding: 10px; display: flex; align-items: center; justify-content: center;
            flex: 1; /* Faz as caixas crescerem proporcionalmente */
        }

        .sequence { display: flex; gap: 8px; }

        .cell {
            width: 55px; height: 55px; border: 3px solid #e0e0e0; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6em; font-weight: bold; background: #fdfdfd;
        }
        @media (max-height: 700px) { .cell { width: 45px; height: 45px; font-size: 1.3em; } }

        .cell.drop-zone { border: 3px dashed var(--primary); background: #f0f4ff; cursor: pointer; color: transparent; }
        .cell.drop-zone:empty::after { content: '?'; color: #ccc; }
        .cell.filled { border-style: solid; border-color: var(--primary); background: #e3f2fd; color: var(--primary); }
        .cell.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724 !important; }
        .cell.incorrect { background: #f8d7da !important; border-color: var(--danger) !important; color: #721c24 !important; }

        .numbers-bank {
            background: #f8f9fa; border-radius: 20px; padding: 12px; border: 2px solid #eee;
            display: flex; flex-direction: column;
        }
        .numbers-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

        .number-item {
            height: 55px; background: white; border: 3px solid var(--header-color);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5em; font-weight: bold; color: var(--header-color); cursor: grab;
            box-shadow: 0 4px 0 #ddd;
        }
        .number-item.used { visibility: hidden; }

        /* Rodapé de Controles */
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn {
            flex: 1; padding: 12px; border-radius: 18px; border: none; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 1.2em; box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }
        .btn-check { background: var(--success); color: white; }
        .btn-reset { background: #edeff1; color: #555; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }

        /* Combo flutuante */
        .bonus-active { animation: pulse-gold 1s infinite; background: var(--gold) !important; }
        @keyframes pulse-gold { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="theme-1">

    <div class="container">
        <header>
            <h1 class="main-title" id="theme-title">
                <i class="fas fa-tree" id="theme-icon"></i> <span id="level-name">Missão Floresta</span>
            </h1>

            <div class="stats-strip">
                <div class="stat-item"><b id="score">0</b><span>Pontos</span></div>
                <div class="stat-item"><b id="streak">0</b><span>Combo</span></div>
                <div class="stat-item"><b><span id="screen-idx">1</span>/8</b><span>Tela</span></div>
            </div>

            <div class="admin-panel">
                <button class="btn-admin btn-new" onclick="resetTotal()" title="Começar do Zero">Novo Jogo</button>
                <button class="btn-admin btn-key" onclick="exportarCodigo()">Salvar Chave</button>
                <button class="btn-admin btn-key" style="background:#007bff" onclick="importarCodigo()">Usar Chave</button>
            </div>
        </header>

        <div class="level-selector">
            <div class="level-tab tab-1 active" onclick="changeLevel(1)">1º Ano</div>
            <div class="level-tab tab-2" onclick="changeLevel(2)">2º/3º Ano</div>
            <div class="level-tab tab-3" onclick="changeLevel(3)">4º Ano</div>
            <div class="level-tab tab-4" onclick="changeLevel(4)">5º Ano</div>
        </div>

        <div class="game-area">
            <div class="challenges-container" id="challenges-list"></div>
            
            <div class="numbers-bank">
                <p style="text-align:center; font-size: 0.7em; font-weight: bold; margin-bottom: 8px; color:#888">ARRASTE OS NÚMEROS:</p>
                <div id="numbers-grid" class="numbers-grid"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-reset" onclick="resetScreen()"><i class="fas fa-eraser"></i> Limpar</button>
            <button class="btn btn-check" id="btn-verify" onclick="verify()" disabled><i class="fas fa-check-circle"></i> Verificar Respostas</button>
        </div>
    </div>

    <script>
        const THEMES = {
            1: { name: "Missão Floresta", icon: "fa-tree", class: "theme-1" },
            2: { name: "Mergulho Marinho", icon: "fa-fish", class: "theme-2" },
            3: { name: "Exploração Espacial", icon: "fa-rocket", class: "theme-3" },
            4: { name: "Busca ao Tesouro", icon: "fa-gem", class: "theme-4" }
        };

        const CONFIG = {
            1: { max: 30, step: [1, 2], pts: 10 },
            2: { max: 100, step: [2, 5], pts: 20 },
            3: { max: 400, step: [5, 10], pts: 40 },
            4: { max: 999, step: [10, 50], pts: 80 }
        };

        const INITIAL_STATE = {
            level: 1, score: 0, correct: 0, errors: 0, streak: 0,
            levelsProgress: {
                1: { screen: 1, challenges: [], options: [], isDone: false },
                2: { screen: 1, challenges: [], options: [], isDone: false },
                3: { screen: 1, challenges: [], options: [], isDone: false },
                4: { screen: 1, challenges: [], options: [], isDone: false }
            }
        };

        let game = JSON.parse(JSON.stringify(INITIAL_STATE));
        const saved = localStorage.getItem('sequencia_v4_fix');
        if (saved) game = JSON.parse(saved);

        function save() { localStorage.setItem('sequencia_v4_fix', JSON.stringify(game)); }

        function resetTotal() {
            if(confirm("Recomeçar o jogo do zero?")) {
                localStorage.removeItem('sequencia_v4_fix');
                game = JSON.parse(JSON.stringify(INITIAL_STATE));
                initLevel(1);
            }
        }

        function exportarCodigo() {
            const p = game.levelsProgress;
            const codigo = `${game.level}-${p[1].screen}-${p[2].screen}-${p[3].screen}-${p[4].screen}-${game.score}-${game.streak}`;
            alert("SUA CHAVE DA MISSÃO:\n\n" + codigo + "\n\nAnote os números no caderno para continuar outro dia!");
        }

        function importarCodigo() {
            const codigo = prompt("Digite os números da sua chave:");
            if (!codigo) return;
            try {
                const pt = codigo.split('-');
                game.level = parseInt(pt[0]);
                game.levelsProgress[1].screen = parseInt(pt[1]);
                game.levelsProgress[2].screen = parseInt(pt[2]);
                game.levelsProgress[3].screen = parseInt(pt[3]);
                game.levelsProgress[4].screen = parseInt(pt[4]);
                game.score = parseInt(pt[5]);
                game.streak = parseInt(pt[6]);
                for(let i=1; i<=4; i++) { game.levelsProgress[i].challenges = []; game.levelsProgress[i].isDone = false; }
                save();
                initLevel(game.level);
            } catch (e) { alert("Chave inválida."); }
        }

        function applyTheme(l) {
            const theme = THEMES[l];
            document.body.className = theme.class;
            document.getElementById('level-name').textContent = theme.name;
            document.getElementById('theme-icon').className = `fas ${theme.icon}`;
        }

        function initLevel(l) {
            game.level = l;
            applyTheme(l);
            updateTabVisuals(l);
            const progress = game.levelsProgress[l];
            if (progress.challenges.length === 0) generateNewScreen(l);
            else render();
        }

        function updateTabVisuals(l) {
            document.querySelectorAll('.level-tab').forEach((t, idx) => t.classList.toggle('active', (idx + 1) === l));
        }

        function generateNewScreen(l) {
            const cfg = CONFIG[l];
            const progress = game.levelsProgress[l];
            progress.challenges = [];
            progress.isDone = false;
            let solutionNumbers = new Set();

            for (let i = 0; i < 5; i++) {
                let seq, holeIdx, target;
                do {
                    const step = Math.floor(Math.random() * (cfg.step[1] - cfg.step[0] + 1)) + cfg.step[0];
                    const start = Math.floor(Math.random() * (cfg.max - (step * 5))) + 1;
                    seq = Array.from({length: 5}, (_, idx) => start + (idx * step));
                    holeIdx = Math.floor(Math.random() * 5);
                    target = seq[holeIdx];
                } while (solutionNumbers.has(target));

                solutionNumbers.add(target);
                progress.challenges.push({ id: i, full: seq, hole: holeIdx, target: target, current: null, status: 'empty' });
            }

            let allOptions = [...solutionNumbers];
            while(allOptions.length < 12) {
                let dist = Math.floor(Math.random() * cfg.max) + 1;
                if(!allOptions.includes(dist)) allOptions.push(dist);
            }
            progress.options = allOptions.sort((a,b) => a - b);
            save();
            render();
        }

        function render() {
            const progress = game.levelsProgress[game.level];
            document.getElementById('score').textContent = game.score;
            document.getElementById('streak').textContent = game.streak;
            document.getElementById('screen-idx').textContent = progress.screen;

            const list = document.getElementById('challenges-list');
            list.innerHTML = progress.challenges.map(ch => `
                <div class="challenge-box">
                    <div class="sequence">
                        ${ch.full.map((num, i) => i === ch.hole ? 
                            `<div class="cell drop-zone ${ch.current ? 'filled' : ''} ${ch.status}" data-id="${ch.id}">${ch.current || ''}</div>` : 
                            `<div class="cell">${num}</div>`
                        ).join('')}
                    </div>
                </div>
            `).join('');

            const grid = document.getElementById('numbers-grid');
            grid.innerHTML = progress.options.map(num => {
                const isUsed = progress.challenges.some(ch => ch.current == num);
                return `<div class="number-item ${isUsed ? 'used' : ''}" draggable="${!isUsed}" data-val="${num}">${num}</div>`;
            }).join('');

            setupEvents();
            updateCheckButton();
        }

        function setupEvents() {
            document.querySelectorAll('.number-item:not(.used)').forEach(item => {
                item.addEventListener('dragstart', e => e.dataTransfer.setData('text/plain', item.dataset.val));
            });

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
                zone.addEventListener('drop', e => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    const val = e.dataTransfer.getData('text/plain');
                    if (val) handlePlacement(zone.dataset.id, val);
                });
                zone.addEventListener('click', () => {
                    const ch = game.levelsProgress[game.level].challenges[zone.dataset.id];
                    if (ch.current && ch.status !== 'correct' && !game.levelsProgress[game.level].isDone) { 
                        ch.current = null; ch.status = 'empty'; render(); 
                    }
                });
            });
        }

        function handlePlacement(id, val) {
            const progress = game.levelsProgress[game.level];
            if (progress.isDone) return;
            const num = parseInt(val);
            progress.challenges.forEach(ch => { if(ch.current === num) { ch.current = null; ch.status = 'empty'; } });
            progress.challenges[id].current = num;
            progress.challenges[id].status = 'filled';
            save();
            render();
        }

        function updateCheckButton() {
            const progress = game.levelsProgress[game.level];
            const allFilled = progress.challenges.every(ch => ch.current !== null);
            document.getElementById('btn-verify').disabled = !allFilled || progress.isDone;
        }

        function verify() {
            const progress = game.levelsProgress[game.level];
            let allCorrect = true;
            progress.challenges.forEach(ch => {
                if(ch.current === ch.target) ch.status = 'correct';
                else { ch.status = 'incorrect'; allCorrect = false; }
            });

            if(allCorrect) {
                progress.isDone = true;
                let earnedPoints = CONFIG[game.level].pts;
                if(game.streak >= 2) earnedPoints *= 2;
                game.score += earnedPoints;
                game.streak++;
                save();
                setTimeout(() => {
                    if(progress.screen < 8) { progress.screen++; generateNewScreen(game.level); }
                    else { handleLevelAdvance(); }
                }, 1000);
            } else {
                game.streak = 0;
                save();
            }
            render();
        }

        function handleLevelAdvance() {
            if(game.level < 4) { alert("🎯 Nível Concluído!"); game.level++; initLevel(game.level); }
            else { alert("🏆 Você é um Mestre!"); }
            save();
        }

        function resetScreen() {
            const progress = game.levelsProgress[game.level];
            if (progress.isDone) return;
            progress.challenges.forEach(ch => { ch.current = null; ch.status = 'empty'; });
            save();
            render();
        }

        function changeLevel(l) { initLevel(l); }

        window.onload = () => initLevel(game.level);
    </script>
</body>
</html>
