<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Some os animais do safári</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #2b8c5e;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .game {
            background: #fff5e6;
            border-radius: 24px;
            max-width: 950px;
            width: 100%;
            height: 95vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .game-header {
            background: #fff5e6;
            padding: 12px 12px 8px 12px;
            border-bottom: 2px solid #ffe0b5;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            margin: 0 0 4px;
            color: #d4560a;
        }

        .sub {
            text-align: center;
            font-size: 0.65rem;
            color: #b45f1b;
            margin-bottom: 8px;
        }

        .level-badge {
            text-align: center;
            background: #ffbf69;
            display: inline-block;
            width: auto;
            margin: 0 auto 8px;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #3b2a1a;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            background: #f7e5cd;
            padding: 5px 10px;
            border-radius: 30px;
        }

        .score-area, .counter-area, .errors-area {
            background: #fff0d0;
            padding: 3px 10px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.75rem;
            color: #5a3a22;
        }

        .score-area span, .counter-area span, .errors-area span {
            font-size: 1rem;
            font-weight: bold;
        }

        .score-area span { color: #e67e22; }
        .counter-area span { color: #2c5a0c; }
        .errors-area span { color: #c0392b; }

        .errors-bar-container {
            background: #e2c294;
            border-radius: 10px;
            height: 6px;
            margin: 6px 0;
            overflow: hidden;
        }

        .errors-bar-fill {
            background: #c0392b;
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-container {
            margin-bottom: 6px;
        }

        .progress-bar-bg {
            background: #e2c294;
            border-radius: 15px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #5f8b3e;
            width: 0%;
            height: 100%;
            border-radius: 15px;
            transition: width 0.3s ease;
        }

        .incentive-message {
            text-align: center;
            font-size: 0.65rem;
            color: #e67e22;
            margin-top: 4px;
            font-weight: bold;
            min-height: 18px;
        }

        .sums-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
            outline: none;
        }

        .sums-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sum-card {
            background: #fffbf0;
            border-radius: 18px;
            padding: 10px;
            border: 1px solid #ffe0b5;
        }

        .animals-row {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }

        .animal-box {
            text-align: center;
        }

        .animal-icons {
            background: #fef3e0;
            padding: 4px 8px;
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .animal-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .plus-sign, .equal-sign {
            font-size: 1.3rem;
            font-weight: bold;
            color: #e67e22;
        }

        .fields-row {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .field-under {
            text-align: center;
            min-width: 70px;
        }

        .field-label {
            font-size: 0.6rem;
            color: #a0723a;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .field {
            background: #efe0cc;
            width: 52px;
            height: 52px;
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px dashed #c29a6b;
            color: #7a5a3a;
            margin: 0 auto;
            transition: background-color 0.2s, transform 0.1s;
        }

        .field.filled {
            background: #c8e6b5;
            border: 2px solid #5f8b3e;
            color: #2c5a0c;
        }

        .field.drag-over {
            background: #ffe0a3;
            border-color: #f5a623;
        }

        .field.correct-flash {
            background-color: #a5d6a5 !important;
            transform: scale(1.05);
        }

        .field.wrong-flash {
            background-color: #ffb3b3 !important;
            transform: scale(0.98);
        }

        .game-footer {
            background: #fff5e6;
            flex-shrink: 0;
            border-top: 2px solid #ffe0b5;
            padding: 10px 12px;
        }

        .bank {
            background: #f7e5cd;
            border-radius: 35px;
            padding: 8px;
            text-align: center;
        }

        .bank-title {
            font-size: 0.65rem;
            background: #e2c294;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            margin-bottom: 6px;
        }

        .numbers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }

        .num {
            background: #ffbf69;
            width: 48px;
            height: 48px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 3px 0 #a45d2a;
        }

        .num:active {
            cursor: grabbing;
        }

        .reset {
            background: #f5bc70;
            border: none;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 30px;
            margin-top: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        .stars-container {
            text-align: center;
            margin-top: 6px;
            font-size: 1rem;
        }

        .footer-credits {
            text-align: center;
            font-size: 0.55rem;
            color: #a0723a;
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px solid #f0dfc0;
        }

        .footer-credits a {
            color: #d4560a;
            text-decoration: none;
        }

        @media (max-width: 550px) {
            .animal-img { width: 42px; height: 42px; }
            .field { width: 46px; height: 46px; font-size: 1.1rem; }
            .num { width: 42px; height: 42px; font-size: 1.1rem; }
            .field-label { font-size: 0.55rem; }
            .plus-sign, .equal-sign { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="game">
    <div class="game-header">
        <h1>🦁 Some os animais do safári 🐘</h1>
        <div class="sub">arraste os números para os espaços abaixo</div>

        <div style="text-align: center;">
            <div class="level-badge" id="levelBadge">🌱 Somente até 10</div>
        </div>

        <div class="top-bar">
            <div class="score-area">⭐ <span id="scoreValue">0</span> / <span id="totalFields">12</span></div>
            <div class="errors-area">❌ Erros: <span id="errorsValue">0</span> / 4</div>
            <div class="counter-area">📋 Telas: <span id="screenCounter">0</span></div>
        </div>

        <div class="errors-bar-container">
            <div class="errors-bar-fill" id="errorsBarFill"></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="incentive-message" id="incentiveMsg"></div>
        </div>
    </div>

    <div class="sums-scroll-area" tabindex="0" id="scrollArea">
        <div id="sumsList" class="sums-list"></div>
    </div>

    <div class="game-footer">
        <div class="bank">
            <div class="bank-title">📦 números disponíveis</div>
            <div id="numbersBank" class="numbers"></div>
        </div>

        <button id="resetBtn" class="reset">🔄 novo jogo</button>
        <div id="starsDisplay" class="stars-container"></div>
        
        <div class="footer-credits">
            🧩 Inspirado em 
            <a href="https://www.digipuzzle.net/kids/cartoons/puzzles/findsum_farm_animals.htm?language=portuguese&linkback=../../../pt/jogoseducativos/matematica-ate-10/index.htm" target="_blank">
                "Encontre as somas" do Digipuzzle.net
            </a>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // LÊ O PARÂMETRO DA URL: ?level=10 ou ?level=20
    // ============================================================
    const urlParams = new URLSearchParams(window.location.search);
    let level = urlParams.get('level');
    
    if (level !== '10' && level !== '20') {
        level = '10';
    }
    
    const MAX_SUM = level === '10' ? 10 : 20;
    const MAX_ERRORS_PER_SCREEN = 4;
    
    const levelBadge = document.getElementById('levelBadge');
    if (level === '10') {
        levelBadge.innerHTML = '🌱 Somente até 10';
        levelBadge.style.background = '#a5d6a5';
    } else {
        levelBadge.innerHTML = '🔥 Desafio até 20';
        levelBadge.style.background = '#ffb3b3';
    }
    
    document.title = `Some os animais - Nível ${level}`;

    const ANIMAIS = [
        { nome: 'Cachorro',  plural: 'cachorros', feminino: false, img: 'https://i.postimg.cc/94w3RFPr/Cachorro.png' },
        { nome: 'Elefante',  plural: 'elefantes', feminino: false, img: 'https://i.postimg.cc/t1n0ZCd1/Elefante.png' },
        { nome: 'Hipopótamo', plural: 'hipopótamos', feminino: false, img: 'https://i.postimg.cc/mc1xz23z/Hipopotamo.png' },
        { nome: 'Leão',      plural: 'leões', feminino: false, img: 'https://i.postimg.cc/jWnVwd6n/Leao.png' },
        { nome: 'Onça',      plural: 'onças', feminino: true, img: 'https://i.postimg.cc/f3S4tT79/Onca.png' },
        { nome: 'Panda',     plural: 'pandas', feminino: false, img: 'https://i.postimg.cc/CZnyBLCD/Panda.png' },
        { nome: 'Rinoceronte', plural: 'rinocerontes', feminino: false, img: 'https://i.postimg.cc/CZ33jTJK/Rinoceronte.png' },
        { nome: 'Tigre',     plural: 'tigres', feminino: false, img: 'https://i.postimg.cc/3yssg59R/Tigre.png' },
        { nome: 'Touro',     plural: 'touros', feminino: false, img: 'https://i.postimg.cc/KK66nSQ1/Touro.png' },
        { nome: 'Vaca',      plural: 'vacas', feminino: true, img: 'https://i.postimg.cc/nsyyvbTs/Vaca.png' },
        { nome: 'Zebra',     plural: 'zebras', feminino: true, img: 'https://i.postimg.cc/WDBBMLSq/Zebra.png' }
    ];

    function getQuantosTexto(animal) {
        const prefixo = animal.feminino ? 'Quantas' : 'Quantos';
        return `${prefixo} ${animal.plural}?`;
    }

    let somas = [];
    let numerosDisponiveis = [];
    let pontuacao = 0;
    let totalCampos = 0;
    let acertosConsecutivos = 0;
    let errosTotais = 0;
    let telasResolvidas = 0;

    const sumsDiv = document.getElementById('sumsList');
    const bankDiv = document.getElementById('numbersBank');
    const resetBtn = document.getElementById('resetBtn');
    const scoreSpan = document.getElementById('scoreValue');
    const totalFieldsSpan = document.getElementById('totalFields');
    const errorsSpan = document.getElementById('errorsValue');
    const errorsBarFill = document.getElementById('errorsBarFill');
    const progressFill = document.getElementById('progressFill');
    const incentiveMsg = document.getElementById('incentiveMsg');
    const starsDisplay = document.getElementById('starsDisplay');
    const screenCounterSpan = document.getElementById('screenCounter');
    const scrollArea = document.getElementById('scrollArea');

    function getAnimalAleatorio() {
        return ANIMAIS[Math.floor(Math.random() * ANIMAIS.length)];
    }

    function criarGrupoAnimal(animal, quantidade) {
        const container = document.createElement('div');
        container.className = 'animal-icons';
        // Mostra todas as imagens, sem "xN" (pode quebrar linha, mas é melhor para o aprendizado)
        for (let i = 0; i < quantidade; i++) {
            const img = document.createElement('img');
            img.src = animal.img;
            img.alt = animal.nome;
            img.className = 'animal-img';
            img.onerror = function() {
                this.style.display = 'none';
                this.insertAdjacentHTML('afterend', `<span style="font-size:1.2rem">❓</span>`);
            };
            container.appendChild(img);
        }
        return container;
    }

    // ============================================================
    // FUNÇÃO CORRIGIDA: totais variados (não apenas o limite)
    // ============================================================
    function gerarSoma() {
        const animal1 = getAnimalAleatorio();
        let animal2 = getAnimalAleatorio();
        while (animal2.nome === animal1.nome) animal2 = getAnimalAleatorio();
        
        // Sorteia um total ALEATÓRIO entre 2 e MAX_SUM
        const total = Math.floor(Math.random() * (MAX_SUM - 1)) + 2;
        
        // Sorteia q1 entre 1 e total-1
        let q1 = Math.floor(Math.random() * (total - 1)) + 1;
        let q2 = total - q1;
        
        return { animal1, q1, animal2, q2, total, fill1: null, fill2: null, fillTotal: null };
    }

    function gerarJogo(qtd = 4) {
        let novas = [];
        for (let i = 0; i < qtd; i++) novas.push(gerarSoma());
        let nums = [];
        novas.forEach(s => { nums.push(s.q1, s.q2, s.total); });
        for (let i = nums.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [nums[i], nums[j]] = [nums[j], nums[i]];
        }
        totalCampos = novas.length * 3;
        return { somas: novas, numeros: nums };
    }

    function reiniciarTelaPorErros() {
        incentiveMsg.innerText = '⚠️ Muitos erros! Vamos recomeçar esta tela... ⚠️';
        setTimeout(() => {
            resetarTelaAtual();
            incentiveMsg.innerText = '';
        }, 2000);
    }
    
    function resetarTelaAtual() {
        const novo = gerarJogo(4);
        somas = novo.somas;
        numerosDisponiveis = novo.numeros;
        pontuacao = 0;
        acertosConsecutivos = 0;
        errosTotais = 0;
        starsDisplay.innerHTML = '';
        atualizarBarras();
        renderizar();
    }

    function atualizarBarras() {
        const errorPercent = (errosTotais / MAX_ERRORS_PER_SCREEN) * 100;
        errorsBarFill.style.width = `${Math.min(errorPercent, 100)}%`;
        
        scoreSpan.innerText = pontuacao;
        totalFieldsSpan.innerText = totalCampos;
        errorsSpan.innerText = errosTotais;
        
        const percent = (pontuacao / totalCampos) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function atualizarPontuacaoUI() {
        atualizarBarras();
        
        if (pontuacao === totalCampos && totalCampos > 0) {
            mostrarEstrelas();
            telasResolvidas++;
            screenCounterSpan.innerText = telasResolvidas;
        }
    }

    function mostrarEstrelas() {
        let estrelas = errosTotais === 0 ? '⭐⭐⭐' : (errosTotais <= 3 ? '⭐⭐' : '⭐');
        starsDisplay.innerHTML = `<div style="background:#ffd966; border-radius:25px; padding:5px;">🏆 ${estrelas} 🏆</div>`;
        setTimeout(() => { if (pontuacao !== totalCampos) starsDisplay.innerHTML = ''; }, 4000);
    }

    function mostrarIncentivo() {
        if (acertosConsecutivos === 3) {
            incentiveMsg.innerText = '🌟 Bom trabalho! 🌟';
            setTimeout(() => { if (acertosConsecutivos !== 0) incentiveMsg.innerText = ''; }, 1200);
        } else if (acertosConsecutivos === 6) {
            incentiveMsg.innerText = '🎉 Você está arrasando! 🎉';
            setTimeout(() => { if (acertosConsecutivos !== 0) incentiveMsg.innerText = ''; }, 1200);
        }
    }

    function piscarCampo(elemento, isCorrect) {
        if (!elemento) return;
        elemento.classList.add(isCorrect ? 'correct-flash' : 'wrong-flash');
        setTimeout(() => elemento.classList.remove(isCorrect ? 'correct-flash' : 'wrong-flash'), 250);
    }

    function verificarECompletar() {
        const todosPreenchidos = somas.every(s => s.fill1 !== null && s.fill2 !== null && s.fillTotal !== null);
        if (!todosPreenchidos) return false;
        const todosCertos = somas.every(s => s.fill1 === s.q1 && s.fill2 === s.q2 && s.fillTotal === s.total);
        if (todosCertos && pontuacao === totalCampos) { 
            setTimeout(() => resetar(), 2000); 
            return true; 
        }
        return false;
    }

    function renderizar() {
        sumsDiv.innerHTML = '';
        somas.forEach((s, idx) => {
            const card = document.createElement('div');
            card.className = 'sum-card';
            
            const animalsRow = document.createElement('div');
            animalsRow.className = 'animals-row';
            
            const box1 = document.createElement('div');
            box1.className = 'animal-box';
            box1.appendChild(criarGrupoAnimal(s.animal1, s.q1));
            
            const plusSpan = document.createElement('span');
            plusSpan.className = 'plus-sign';
            plusSpan.innerText = '+';
            
            const box2 = document.createElement('div');
            box2.className = 'animal-box';
            box2.appendChild(criarGrupoAnimal(s.animal2, s.q2));
            
            const equalSpan = document.createElement('span');
            equalSpan.className = 'equal-sign';
            equalSpan.innerText = '=';
            
            animalsRow.appendChild(box1);
            animalsRow.appendChild(plusSpan);
            animalsRow.appendChild(box2);
            animalsRow.appendChild(equalSpan);
            
            const fieldsRow = document.createElement('div');
            fieldsRow.className = 'fields-row';
            
            const fieldUnder1 = document.createElement('div');
            fieldUnder1.className = 'field-under';
            const label1 = document.createElement('div');
            label1.className = 'field-label';
            label1.innerText = getQuantosTexto(s.animal1);
            const campo1 = criarCampo('q1', idx, s.fill1);
            fieldUnder1.appendChild(label1);
            fieldUnder1.appendChild(campo1);
            
            const spacer1 = document.createElement('div');
            spacer1.style.width = '15px';
            
            const fieldUnder2 = document.createElement('div');
            fieldUnder2.className = 'field-under';
            const label2 = document.createElement('div');
            label2.className = 'field-label';
            label2.innerText = getQuantosTexto(s.animal2);
            const campo2 = criarCampo('q2', idx, s.fill2);
            fieldUnder2.appendChild(label2);
            fieldUnder2.appendChild(campo2);
            
            const spacer2 = document.createElement('div');
            spacer2.style.width = '15px';
            
            const totalField = document.createElement('div');
            totalField.className = 'field-under';
            const labelTotal = document.createElement('div');
            labelTotal.className = 'field-label';
            labelTotal.innerText = 'Total';
            const campoTot = criarCampo('total', idx, s.fillTotal);
            totalField.appendChild(labelTotal);
            totalField.appendChild(campoTot);
            
            fieldsRow.appendChild(fieldUnder1);
            fieldsRow.appendChild(spacer1);
            fieldsRow.appendChild(fieldUnder2);
            fieldsRow.appendChild(spacer2);
            fieldsRow.appendChild(totalField);
            
            card.appendChild(animalsRow);
            card.appendChild(fieldsRow);
            sumsDiv.appendChild(card);
        });
        
        bankDiv.innerHTML = '';
        numerosDisponiveis.forEach(num => {
            const numDiv = document.createElement('div');
            numDiv.className = 'num';
            numDiv.innerText = num;
            numDiv.setAttribute('draggable', 'true');
            numDiv.addEventListener('dragstart', e => {
                e.dataTransfer.setData('text/plain', num);
                numDiv.style.opacity = '0.5';
            });
            numDiv.addEventListener('dragend', e => { numDiv.style.opacity = '1'; });
            bankDiv.appendChild(numDiv);
        });
        atualizarPontuacaoUI();
        verificarECompletar();
    }
    
    function criarCampo(tipo, idxSoma, valorAtual) {
        const campo = document.createElement('div');
        campo.className = 'field';
        campo.innerText = valorAtual !== null ? valorAtual : '?';
        if (valorAtual !== null) campo.classList.add('filled');
        campo.setAttribute('data-tipo', tipo);
        campo.setAttribute('data-idx', idxSoma);
        campo.addEventListener('dragover', e => { e.preventDefault(); campo.classList.add('drag-over'); });
        campo.addEventListener('dragleave', () => { campo.classList.remove('drag-over'); });
        campo.addEventListener('drop', e => {
            e.preventDefault();
            campo.classList.remove('drag-over');
            const valor = parseInt(e.dataTransfer.getData('text/plain'), 10);
            const tipoCampo = campo.getAttribute('data-tipo');
            const idx = parseInt(campo.getAttribute('data-idx'), 10);
            tentarPreencher(idx, tipoCampo, valor, campo);
        });
        return campo;
    }
    
    function tentarPreencher(idxSoma, tipo, valor, campoElement) {
        const soma = somas[idxSoma];
        if (!soma) return;
        let campoAtual = null, valorCorreto = null;
        if (tipo === 'q1') { campoAtual = soma.fill1; valorCorreto = soma.q1; }
        else if (tipo === 'q2') { campoAtual = soma.fill2; valorCorreto = soma.q2; }
        else { campoAtual = soma.fillTotal; valorCorreto = soma.total; }
        if (campoAtual !== null) return;
        const idxNum = numerosDisponiveis.indexOf(valor);
        if (idxNum === -1) return;
        
        if (valor === valorCorreto) {
            numerosDisponiveis.splice(idxNum, 1);
            if (tipo === 'q1') soma.fill1 = valor;
            if (tipo === 'q2') soma.fill2 = valor;
            if (tipo === 'total') soma.fillTotal = valor;
            pontuacao++;
            acertosConsecutivos++;
            mostrarIncentivo();
            piscarCampo(campoElement, true);
            renderizar();
        } else {
            errosTotais++;
            acertosConsecutivos = 0;
            piscarCampo(campoElement, false);
            atualizarPontuacaoUI();
            
            if (errosTotais >= MAX_ERRORS_PER_SCREEN) {
                reiniciarTelaPorErros();
            }
        }
    }
    
    function resetar() {
        const novo = gerarJogo(4);
        somas = novo.somas;
        numerosDisponiveis = novo.numeros;
        pontuacao = 0;
        acertosConsecutivos = 0;
        errosTotais = 0;
        starsDisplay.innerHTML = '';
        incentiveMsg.innerHTML = '';
        atualizarBarras();
        renderizar();
    }
    
    resetBtn.addEventListener('click', () => resetar());
    resetar();
    scrollArea.focus();
</script>
</body>
</html>
